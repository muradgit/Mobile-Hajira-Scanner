<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile-Hajira | QR Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #13151a;
      --surface2: #1c1f26;
      --border: #2a2d35;
      --accent: #00e5a0;
      --accent2: #6f42c1;
      --danger: #ff4757;
      --warning: #ffa502;
      --text: #e8eaf0;
      --muted: #5a5f6e;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 100px;
    }

    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,12,16,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hdr-brand {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hdr-brand span { color: var(--muted); }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
    .dot.green { background: var(--accent); }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    .ctx-bar {
      margin: 12px 16px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .ctx-row { display: flex; flex-wrap: wrap; gap: 4px 12px; }

    .ctx-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.65rem;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .cam-wrap {
      margin: 0 16px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
    #reader video { border-radius: 0 !important; }
    #reader__scan_region { border: none !important; }
    #reader__scan_region img { display: none; }
    #reader__dashboard { display: none !important; }

    .cam-corner { position: absolute; width: 20px; height: 20px; z-index: 10; pointer-events: none; }
    .cam-corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .cam-corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .cam-corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .cam-corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s linear infinite;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 8px var(--accent);
    }

    @keyframes scanMove {
      0% { top: 10%; }
      50% { top: 85%; }
      100% { top: 10%; }
    }

    .status {
      margin: 10px 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .status.info    { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.2); color: var(--accent); }
    .status.success { background: rgba(0,229,160,0.15); border-color: var(--accent); color: var(--accent); }
    .status.error   { background: rgba(255,71,87,0.12); border-color: rgba(255,71,87,0.3); color: var(--danger); }
    .status.warning { background: rgba(255,165,2,0.12); border-color: rgba(255,165,2,0.3); color: var(--warning); }

    .counter-row { margin: 0 16px 10px; display: flex; gap: 8px; }

    .counter-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .counter-num { font-family: var(--display); font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .counter-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    .btn-finish {
      display: none;
      margin: 0 16px 12px;
      width: calc(100% - 32px);
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,229,160,0.3);
      transition: all 0.2s ease;
    }

    .btn-finish:active { transform: scale(0.98); }
    .btn-finish.visible { display: block; animation: popIn 0.3s ease; }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .log-wrap { margin: 0 16px; }

    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

    .log-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .log-list {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); }

    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(-10px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .log-num {
      width: 22px; height: 22px;
      background: var(--accent2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    .log-id { font-size: 0.72rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-check { color: var(--accent); font-size: 0.9rem; flex-shrink: 0; }
    .log-empty { text-align: center; color: var(--muted); font-size: 0.72rem; padding: 24px; border: 1px dashed var(--border); border-radius: 6px; }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(11,12,16,0.92);
      z-index: 200;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px;
      backdrop-filter: blur(4px);
    }

    .overlay.show { display: flex; }

    .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-msg { font-family: var(--display); font-size: 1rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
    .overlay-sub { font-size: 0.72rem; color: var(--muted); }

    /* ── ACK TIMEOUT NOTICE ── */
    .ack-notice {
      display: none;
      margin: 8px 16px 0;
      padding: 10px 14px;
      background: rgba(255,165,2,0.1);
      border: 1px solid var(--warning);
      border-radius: 8px;
      font-size: 0.7rem;
      color: var(--warning);
      text-align: center;
    }

    .ack-notice.show { display: block; }

    .copy-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: var(--warning);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    .fallback-ids {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--text);
      resize: none;
      height: 60px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-msg">SENDING DATA</div>
    <div class="overlay-sub">Communicating with GAS...</div>
  </div>

  <div class="wrap">

    <div class="hdr">
      <div class="hdr-brand">MOBILE<span>-</span>HAJIRA</div>
      <div class="live-dot">
        <div class="dot" id="live-dot"></div>
        <span id="live-txt">STARTING</span>
      </div>
    </div>

    <div class="ctx-bar">
      <div style="color:var(--muted);font-size:0.65rem;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Session Info</div>
      <div class="ctx-row" id="ctx-tags"><span class="ctx-tag">Loading...</span></div>
    </div>

    <div class="cam-wrap">
      <div class="cam-corner tl"></div>
      <div class="cam-corner tr"></div>
      <div class="cam-corner bl"></div>
      <div class="cam-corner br"></div>
      <div class="scan-line" id="scan-line"></div>
      <div id="reader"></div>
    </div>

    <div class="status info" id="status">
      <span>📷</span><span id="status-txt">Camera initializing...</span>
    </div>

    <div class="counter-row">
      <div class="counter-box">
        <div class="counter-num" id="count-scanned">0</div>
        <div class="counter-lbl">Scanned</div>
      </div>
      <div class="counter-box">
        <div class="counter-num" id="count-invalid" style="color:var(--danger)">0</div>
        <div class="counter-lbl">Rejected</div>
      </div>
      <div class="counter-box">
        <div class="counter-num" id="count-dup" style="color:var(--warning)">0</div>
        <div class="counter-lbl">Duplicate</div>
      </div>
    </div>

    <button class="btn-finish" id="btn-finish" onclick="finishScan()">
      ⬆ SAVE — <span id="finish-count">0</span> STUDENTS
    </button>

    <!-- Fallback: যদি postMessage কাজ না করে -->
    <div class="ack-notice" id="ack-notice">
      <div>⚠ Auto-send failed. Copy these IDs and paste manually in the main app.</div>
      <textarea class="fallback-ids" id="fallback-ids" readonly></textarea>
      <button class="copy-btn" onclick="copyFallback()">📋 Copy All IDs</button>
    </div>

    <div class="log-wrap">
      <div class="log-header">
        <div class="log-title">// Scan Log</div>
        <button class="btn-clear" onclick="clearAll()">CLEAR ALL</button>
      </div>
      <div class="log-list" id="log-list">
        <div class="log-empty">Point camera at a student QR code</div>
      </div>
    </div>

  </div>

  <script>
    'use strict';

    // ============================================================
    // ★ CONFIGURATION — GAS Web App URL এখানে দাও
    //   (cross-origin postMessage validation-এর জন্য)
    // ============================================================
    // তোমার GAS deploy URL-এর origin বের করো:
    // যেমন: https://script.google.com হলে নিচের GAS_ORIGIN ঠিক আছে
    const GAS_ORIGIN = 'https://script.google.com';
    // অথবা যদি redirect হয়: 'https://script.googleusercontent.com'
    // দুটোই allow করতে চাইলে নিচে ALLOWED_ORIGINS array ব্যবহার হয়
    const ALLOWED_ORIGINS = [
      'https://script.google.com',
      'https://script.googleusercontent.com'
    ];

    // ============================================================
    // 1. PARSE URL PARAMETERS
    // ============================================================
    const p = new URLSearchParams(window.location.search);

    const ctx = {
      teacher:   p.get('teacher')   || 'Unknown',
      level:     p.get('level')     || '',
      deptGroup: (p.get('deptGroup') || '').split(',').filter(Boolean),
      session:   p.get('session')   || '',
      subject:   p.get('subject')   || '',
      classYear: p.get('classYear') || ''
    };

    // Student ID validation list
    let validIds = new Set();
    try {
      JSON.parse(p.get('studentIds') || '[]').forEach(id => validIds.add(String(id).trim()));
    } catch(e) {}

    // ============================================================
    // 2. RENDER CONTEXT
    // ============================================================
    const tags = [ctx.teacher, ctx.subject, ctx.session, ...ctx.deptGroup, ctx.classYear]
      .filter(Boolean)
      .map(t => `<span class="ctx-tag">${t}</span>`).join('');
    document.getElementById('ctx-tags').innerHTML = tags || '<span class="ctx-tag">No session info</span>';

    // ============================================================
    // 3. STATE
    // ============================================================
    let scannedBatch  = [];
    let invalidCount  = 0;
    let dupCount      = 0;
    let scanner       = null;
    let lastCode      = '';
    let lastTime      = 0;
    let ackReceived   = false;   // GAS-এর reply পেয়েছি কিনা
    let ackTimer      = null;

    // ============================================================
    // 4. LISTEN FOR ACK FROM GAS PARENT WINDOW
    //GAS window যখন data receive করবে, সে acknowledge পাঠাব
    // ============================================================
    window.addEventListener('message', function(event) {

      const data = event.data;
      if (!data || data.type !== 'HAJIRA_ACK') return;

      ackReceived = true;
      clearTimeout(ackTimer);
      document.getElementById('overlay').classList.remove('show');

      if (data.status === 'saving') {
        showToast('✅ Saved Successfully!');
        setTimeout(() => window.close(), 1500);
      } else if (data.status === 'error') {
        // ★ ডুপ্লিকেট বা এরর হলে স্ক্যানার উইন্ডোতেই এলার্ট দেখাবে এবং বাটন আবার এনাবল করবে
        alert(data.message);
        document.getElementById('live-txt').textContent = 'READY';
        document.getElementById('btn-finish').disabled = false;
        
        // চাইলে স্ক্যান করা লিস্ট ক্লিয়ার করে দিতে পারেন
        // clearAll(); 
      }
    });

    // ============================================================
    // 5. INIT CAMERA
    // ============================================================
    scanner = new Html5Qrcode('reader');

    scanner.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: (vw, vh) => ({ width: Math.min(vw, vh) * 0.7, height: Math.min(vw, vh) * 0.7 }),
        aspectRatio: 1.0
      },
      onScanSuccess,
      () => {}
    ).then(() => {
      setStatus('info', '📡', 'Camera ready — point at QR code');
      document.getElementById('live-dot').classList.add('green');
      document.getElementById('live-txt').textContent = 'LIVE';
    }).catch(err => {
      setStatus('error', '❌', 'Camera error: ' + String(err).substring(0, 60));
      document.getElementById('live-txt').textContent = 'ERROR';
      document.getElementById('scan-line').style.display = 'none';
    });

    // ============================================================
    // 6. SCAN HANDLER
    // ============================================================
    function onScanSuccess(text) {
      const now = Date.now();
      if (text === lastCode && (now - lastTime) < 2000) return;
      lastCode = text;
      lastTime = now;

      const id = text.trim();

      if (scannedBatch.includes(id)) {
        dupCount++;
        updateCounters();
        setStatus('warning', '🔁', 'Duplicate: ' + id);
        vibrate([100, 50, 100]);
        return;
      }

      if (validIds.size > 0 && !validIds.has(id)) {
        invalidCount++;
        updateCounters();
        setStatus('error', '🚫', 'Unknown ID: ' + id);
        vibrate([300]);
        return;
      }

      scannedBatch.push(id);
      updateCounters();
      addLogItem(id);
      setStatus('success', '✅', 'Scanned: ' + id);
      vibrate([40]);
    }

    // ============================================================
    // 7. FINISH — postMessage দিয়ে GAS-এ পাঠাও
    // ============================================================
    function finishScan() {
      if (scannedBatch.length === 0) return alert('No students scanned!');
      if (!confirm(`Save attendance for ${scannedBatch.length} student(s)?\n\nTeacher: ${ctx.teacher}\nSubject: ${ctx.subject}\nCost: 2 Credits`)) return;

      // Camera stop
      try { scanner.stop(); } catch(e) {}
      document.getElementById('scan-line').style.display = 'none';
      document.getElementById('live-dot').classList.remove('green');
      document.getElementById('live-txt').textContent = 'DONE';
      document.getElementById('btn-finish').disabled = true;

      const payload = {
        type:        'HAJIRA_SCAN_DATA',   // ★ Message type identifier
        students:    scannedBatch.slice(),
        teacher:     ctx.teacher,
        level:       ctx.level,
        deptGroup:   ctx.deptGroup,
        session:     ctx.session,
        subjectName: ctx.subject,
        classYear:   ctx.classYear
      };

      // Overlay দেখাও
      document.getElementById('overlay').classList.add('show');

      // ── postMessage দিয়ে parent window-এ পাঠাও ──
      if (window.opener && !window.opener.closed) {
        try {
          // '*' দিলে সব origin-এ যাবে, কিন্তু GAS_ORIGIN দিলে শুধু সেখানে যাবে
          // GAS-এর exact origin না জানলে '*' ব্যবহার করতে পারো
          window.opener.postMessage(payload, '*');

          // ৩ সেকেন্ডের মধ্যে ACK না আসলে fallback দেখাও
          ackTimer = setTimeout(() => {
            if (!ackReceived) {
              document.getElementById('overlay').classList.remove('show');
              showFallback();
            }
          }, 3000);

        } catch(e) {
          document.getElementById('overlay').classList.remove('show');
          showFallback();
        }
      } else {
        // Direct URL-এ খোলা হয়েছে (GAS-এর বাইরে)
        document.getElementById('overlay').classList.remove('show');
        showFallback();
      }
    }

    // ============================================================
    // 8. FALLBACK — যখন postMessage কাজ করে না
    // ============================================================
    function showFallback() {
      document.getElementById('fallback-ids').value = scannedBatch.join(',');
      document.getElementById('ack-notice').classList.add('show');
      setStatus('warning', '⚠️', 'Manual copy needed. See below.');
    }

    function copyFallback() {
      const text = document.getElementById('fallback-ids').value;
      navigator.clipboard.writeText(text)
        .then(() => alert('✅ IDs copied! Paste in main app.'))
        .catch(() => {
          document.getElementById('fallback-ids').select();
          document.execCommand('copy');
          alert('✅ Copied!');
        });
    }

    // ============================================================
    // 9. UI HELPERS
    // ============================================================
    function setStatus(type, icon, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    }

    function updateCounters() {
      document.getElementById('count-scanned').textContent = scannedBatch.length;
      document.getElementById('count-invalid').textContent = invalidCount;
      document.getElementById('count-dup').textContent     = dupCount;
      document.getElementById('finish-count').textContent  = scannedBatch.length;
      const btn = document.getElementById('btn-finish');
      scannedBatch.length > 0 ? btn.classList.add('visible') : btn.classList.remove('visible');
    }

    function addLogItem(id) {
      const list = document.getElementById('log-list');
      const empty = list.querySelector('.log-empty');
      if (empty) empty.remove();
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `
        <div class="log-num">${scannedBatch.length}</div>
        <div class="log-id">${id}</div>
        <div class="log-check">✓</div>`;
      list.insertBefore(item, list.firstChild);
    }

    function showToast(msg) {
      setStatus(msg.startsWith('✅') ? 'success' : 'error', '', msg);
    }

    function vibrate(p) {
      try { if (navigator.vibrate) navigator.vibrate(p); } catch(e) {}
    }

    function clearAll() {
      if (!confirm('Clear all scanned data?')) return;
      scannedBatch = []; invalidCount = 0; dupCount = 0; lastCode = '';
      document.getElementById('log-list').innerHTML = '<div class="log-empty">Point camera at a student QR code</div>';
      document.getElementById('ack-notice').classList.remove('show');
      updateCounters();
      setStatus('info', '📡', 'Cleared. Ready to scan.');
    }
  </script>
</body>
